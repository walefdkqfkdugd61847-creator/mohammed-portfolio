<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الواجهة العصبية | السايبربانك</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #050a10;
            --glow: 0 0 15px var(--neon);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .terminal {
            width: 90%;
            max-width: 600px;
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid var(--neon);
            box-shadow: var(--glow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        #chat-window {
            flex-grow: 1;
            overflow-y: auto;
            border-bottom: 1px solid var(--neon);
            margin-bottom: 15px;
            padding: 10px;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }

        .task-item {
            border-right: 3px solid var(--neon);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            margin: 5px 0;
            animation: flicker 0.5s infinite alternate;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: black;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px;
            outline: none;
        }

        button {
            background: var(--neon);
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #loader { display: none; color: #ff00ff; text-align: center; margin-bottom: 5px; }

        @keyframes flicker {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align: center; text-shadow: var(--glow);">البروتوكول العصبي v1.0</h2>
    
    <div id="settings" style="margin-bottom: 15px; font-size: 0.8em;">
        <input type="password" id="apiKey" placeholder="أدخل API Key..." style="width: 60%;">
        <button onclick="saveKey()">حفظ المفتاح</button>
    </div>

    <div id="loader">... جاري تحليل النبضات العصبية ...</div>
    
    <div id="chat-window"></div>
    
    <ul id="taskList" class="task-list"></ul>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="أدخل أمرك هنا..." onkeypress="if(event.key==='Enter') startAnalysis()">
        <button onclick="startAnalysis()">إرسال</button>
    </div>
</div>

<script>
    // 1. نظام الحفظ والاسترجاع
    function saveKey() {
        localStorage.setItem('cyber_key', document.getElementById('apiKey').value);
        alert("تم تحديث مفتاح التشفير!");
    }

    function getTasks() {
        return JSON.parse(localStorage.getItem('cyber_tasks') || '[]');
    }

    function saveTasks(tasks) {
        localStorage.setItem('cyber_tasks', JSON.stringify(tasks));
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = getTasks().map(t => `<li class="task-item">${t}</li>`).join('');
    }

    // 2. محرك التفاعل مع Gemini
    async function startAnalysis() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat-window');
        const key = localStorage.getItem('cyber_key');

        if (!key) return alert("خطأ: مفتاح الـ API مفقود!");
        if (!input.value) return;

        const userMsg = input.value;
        chat.innerHTML += `<div>👤: ${userMsg}</div>`;
        input.value = '';
        document.getElementById('loader').style.display = 'block';

        const currentTasks = getTasks().join(", ");
        
        // تعليمات النظام (System Instructions)
        const systemPrompt = `أنت مساعد سايبربانك. مهام المستخدم الحالية هي: [${currentTasks}].
        إذا طلب المستخدم إضافة مهمة، ابدأ ردك بـ [ADD_TASK] اسم المهمة |.
        إذا طلب حذف مهمة، ابدأ بـ [DELETE_TASK] اسم المهمة |.
        إذا شعرت أن المستخدم متوتر أو غاضب، ابدأ بـ [MOOD: STRESS] |.
        ثم اكتب ردك الطبيعي للمستخدم بعد علامة |.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt + "\nالمستخدم يقول: " + userMsg }] }]
                })
            });

            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;
            handleAIResponse(aiReply);

        } catch (e) {
            document.documentElement.style.setProperty('--neon', '#ff8c00');
            chat.innerHTML += `<div style="color: #ff8c00;">⚠️ خطأ في الاتصال بالشبكة!</div>`;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    // 3. معالج ردود الأوامر والمشاعر
    function handleAIResponse(reply) {
        const chat = document.getElementById('chat-window');
        let finalMessage = reply;

        // تحليل المشاعر
        if (reply.includes("[MOOD: STRESS]")) {
            document.documentElement.style.setProperty('--neon', '#ff0000');
            finalMessage = finalMessage.replace("[MOOD: STRESS] |", "");
        } else {
            document.documentElement.style.setProperty('--neon', '#00f2ff');
        }

        // تحليل إضافة المهام
        if (reply.includes("[ADD_TASK]")) {
            const parts = reply.split("|");
            const taskName = parts[0].replace("[ADD_TASK]", "").trim();
            const tasks = getTasks();
            tasks.push(taskName);
            saveTasks(tasks);
            finalMessage = parts[1];
        }

        // تحليل حذف المهام
        if (reply.includes("[DELETE_TASK]")) {
            const parts = reply.split("|");
            const taskName = parts[0].replace("[DELETE_TASK]", "").trim();
            let tasks = getTasks();
            tasks = tasks.filter(t => !t.includes(taskName));
            saveTasks(tasks);
            finalMessage = parts[1];
        }

        chat.innerHTML += `<div>🤖: ${finalMessage}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    window.onload = renderTasks;
</script>

</body>
</html>
