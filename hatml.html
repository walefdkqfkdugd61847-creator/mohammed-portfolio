<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammed | The Masterpiece</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #92ffd7;
        }

        body {
            margin: 0; padding: 0;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            perspective: 1500px;
        }

        #particles-js {
            position: absolute; width: 100%; height: 100%; z-index: 1;
        }

        /* حاوية بتأثير 3D */
        .card {
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            width: 320px;
            transform-style: preserve-3d;
            box-shadow: 0 50px 80px rgba(0,0,0,0.5);
            animation: emerge 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes emerge {
            0% { opacity: 0; transform: translateZ(-200px) translateY(50px); }
            100% { opacity: 1; transform: translateZ(0) translateY(0); }
        }

        /* الصورة مع تأثير الطفو */
        .profile-wrap {
            width: 130px; height: 130px;
            margin: 0 auto 20px;
            transform: translateZ(50px); /* تبرز للخارج */
        }

        .profile-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            object-fit: cover;
            animation: hoverEffect 4s ease-in-out infinite;
        }

        @keyframes hoverEffect {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* النص اللامع */
        h1 {
            font-size: 32px;
            background: linear-gradient(90deg, #fff, var(--primary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* الأزرار التفاعلية */
        .links a {
            display: block;
            margin: 20px 0;
            padding: 16px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            transform: translateZ(30px);
        }

        .links a:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 30px rgba(255,255,255,0.3);
            transform: translateZ(50px) scale(1.05);
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="card" id="card">
        <div class="profile-wrap">
            <img src="63629.png" alt="Profile" class="profile-img">
        </div>
        
        <h1>محمد</h1>
        <p style="color: #888;">Modern Digital Presence</p>

        <div class="links">
            <a href="https://wa.me/201285704748" target="_blank" style="border-left: 5px solid #25d366;">WhatsApp</a>
            <a href="https://www.instagram.com/1mohammed145" target="_blank" style="border-left: 5px solid #c13584;">Instagram</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 80 },
                color: { value: "#ffffff" },
                size: { value: 2 },
                move: { enable: true, speed: 1.5 }
            },
            interactivity: { events: { onhover: { enable: true, mode: "repulse" } } }
        });

        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 20;
            let y = (window.innerHeight / 2 - e.pageY) / 20;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
